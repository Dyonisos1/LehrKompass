<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:transparent; overflow:hidden; }
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  var canvas = document.getElementById('c');
  var DPR    = Math.min(window.devicePixelRatio || 1, 3);

  function size(){ return Math.min(window.innerWidth, window.innerHeight); }

  function resize(){
    var s = size();
    canvas.style.width  = s + 'px';
    canvas.style.height = s + 'px';
    canvas.style.margin = '0 auto';
    canvas.style.display = 'block';
    canvas.width  = s * DPR;
    canvas.height = s * DPR;
    if(renderer){
      renderer.setSize(s, s, false);
      if(camera){ camera.aspect=1; camera.updateProjectionMatrix(); }
    }
  }

  var renderer, scene, camera, mg, ng;

  function init(){
    resize();

    renderer = new THREE.WebGLRenderer({canvas:canvas,antialias:true,alpha:true,powerPreference:'default'});
    renderer.setPixelRatio(DPR);
    renderer.setSize(size(), size(), false);
    renderer.setClearColor(0x000000, 0);
    renderer.sortObjects = true;

    scene  = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
    camera.position.set(0, 0, 110);
    scene.add(new THREE.AmbientLight(0xffffff, 1.0));

    function mat(hex,ro,me,pf,pu){
      return new THREE.MeshStandardMaterial({
        color:hex,roughness:ro,metalness:me,side:THREE.DoubleSide,
        polygonOffset:!!(pf||pu),polygonOffsetFactor:pf||0,polygonOffsetUnits:pu||0
      });
    }
    var MW=mat(0xffffff,0.92,0.01,3,3), MY=mat(0xdcdf6a,0.88,0.03,3,3);
    var MC=mat(0xee6c4d,0.80,0.05,3,3);
    var MS=new THREE.MeshStandardMaterial({color:0x203a40,roughness:0.9,metalness:0.02,side:THREE.FrontSide});

    function sv(x,y){ return new THREE.Vector2(x-35.786,-(y-35.51)); }
    function psh(p){
      var s=new THREE.Shape(); s.moveTo(p[0].x,p[0].y);
      for(var i=1;i<p.length;i++) s.lineTo(p[i].x,p[i].y);
      s.closePath(); return s;
    }
    function ext(p,d){ return new THREE.ExtrudeGeometry(psh(p),{depth:d,bevelEnabled:false}); }

    var SW=1.255,S2=SW/2,SD=0.08;
    function strk(p,zf,g){
      var cz=zf+SD/2;
      for(var i=0;i<p.length;i++){
        var a=p[i],b=p[(i+1)%p.length],dx=b.x-a.x,dy=b.y-a.y,L=Math.sqrt(dx*dx+dy*dy);
        var sg=new THREE.Mesh(new THREE.BoxGeometry(L,SW,SD),MS);
        sg.position.set((a.x+b.x)/2,(a.y+b.y)/2,cz); sg.rotation.z=Math.atan2(dy,dx); g.add(sg);
        var cp=new THREE.Mesh(new THREE.CylinderGeometry(S2,S2,SD,48),MS);
        cp.rotation.x=Math.PI/2; cp.position.set(a.x,a.y,cz); g.add(cp);
      }
    }
    function lyr(p,fm,d,z,g,sk){
      var me=new THREE.Mesh(ext(p,d),fm); me.position.z=z; g.add(me);
      if(sk!==false) strk(p,z+d,g);
    }

    var DD=4,LD=0.8,ND=0.9,G=0.6;
    var ZDF=DD,ZM=ZDF+G,ZO=ZM+LD+G,ZI=ZO+LD+G,ZN=ZI+LD+G;
    mg=new THREE.Group(); scene.add(mg);
    ng=new THREE.Group();

    var dc=new THREE.Mesh(new THREE.CylinderGeometry(27.293,27.293,DD,192),MW);
    dc.rotation.x=Math.PI/2; dc.position.z=DD/2; mg.add(dc);
    var rs=new THREE.Shape(); rs.absarc(0,0,27.293+S2,0,Math.PI*2,false);
    var rh=new THREE.Path(); rh.absarc(0,0,27.293-S2,0,Math.PI*2,true); rs.holes.push(rh);
    var rm=new THREE.Mesh(new THREE.ExtrudeGeometry(rs,{depth:SD,bevelEnabled:false,curveSegments:256}),MS);
    rm.position.z=ZDF; mg.add(rm);

    lyr([sv(53.778,53.501),sv(35.786,45.228),sv(17.794,53.501),sv(26.067,35.51),
         sv(17.794,17.518),sv(35.786,25.791),sv(53.778,17.518),sv(45.505,35.51)],MY,LD,ZM,mg);
    lyr([sv(35.786,68.851),sv(26.781,44.515),sv(2.445,35.51),sv(26.781,26.504),
         sv(35.786,2.168),sv(44.791,26.504),sv(69.128,35.51),sv(44.791,44.515)],MW,LD,ZO,mg);
    lyr([sv(35.786,56.918),sv(32.829,38.467),sv(14.378,35.51),sv(32.829,32.552),
         sv(35.786,14.101),sv(38.744,32.552),sv(57.194,35.51),sv(38.744,38.467)],MY,LD,ZI,mg);

    mg.add(ng);
    lyr([sv(31.48,31.278),sv(28.456,42.968),sv(40.093,39.741),sv(43.116,28.051)],MC,ND,ZN,ng);
    var ns=new THREE.Shape();
    ns.moveTo(sv(31.48,31.278).x,sv(31.48,31.278).y);
    ns.lineTo(sv(28.456,42.968).x,sv(28.456,42.968).y);
    ns.lineTo(sv(40.093,39.741).x,sv(40.093,39.741).y); ns.closePath();
    var nm=new THREE.Mesh(new THREE.ExtrudeGeometry(ns,{depth:ND,bevelEnabled:false}),
      new THREE.MeshStandardMaterial({color:0x203a40,roughness:0.9,metalness:0.02,
        side:THREE.FrontSide,polygonOffset:true,polygonOffsetFactor:2,polygonOffsetUnits:2}));
    nm.position.z=ZN+ND+0.15; ng.add(nm);
    var p1=sv(31.48,31.278),p2=sv(40.093,39.741),ddx=p2.x-p1.x,ddy=p2.y-p1.y;
    var lm=new THREE.Mesh(new THREE.BoxGeometry(Math.sqrt(ddx*ddx+ddy*ddy),SW,ND),
      new THREE.MeshStandardMaterial({color:0x203a40,roughness:0.9,metalness:0.02,side:THREE.FrontSide}));
    lm.position.set((p1.x+p2.x)/2,(p1.y+p2.y)/2,ZN+ND+0.15+ND/2);
    lm.rotation.z=Math.atan2(ddy,ddx); ng.add(lm);

    // animation
    var na=0,an=false,na0=0,nt0=0,spOn=false,spT0=0;
    var NDUR=4500,NROT=-5*Math.PI*2,SZ=0.45,SW0=7,SWD=SW0*Math.sqrt(1-SZ*SZ);
    var SA=THREE.MathUtils.degToRad(3.8);
    var LT=[0,3.9e-5,3.07e-4,1.005e-3,2.31e-3,4.371e-3,7.31e-3,0.011221,
      0.016172,0.022204,0.02933,0.037537,0.046784,0.057003,0.0681,0.079952,
      0.092412,0.105303,0.118421,0.131579,0.144737,0.157895,0.171053,0.184211,
      0.197368,0.210526,0.223684,0.236842,0.25,0.263158,0.276316,0.289474,
      0.302632,0.315789,0.328947,0.342105,0.355263,0.368421,0.381579,0.394737,
      0.407895,0.421053,0.434211,0.447368,0.460526,0.473684,0.486842,0.5,
      0.513158,0.526316,0.539474,0.552632,0.565789,0.578947,0.592105,0.605263,
      0.618421,0.631579,0.644737,0.657895,0.671053,0.684211,0.697368,0.710526,
      0.723684,0.736842,0.75,0.763158,0.776316,0.789474,0.802632,0.815775,
      0.828834,0.84173,0.85439,0.866746,0.878737,0.890307,0.901407,0.911993,
      0.922027,0.931477,0.940316,0.948524,0.956086,0.962993,0.969244,0.974839,
      0.979789,0.984108,0.987817,0.990941,0.993513,0.99557,0.997158,0.998325,
      0.999127,0.999625,0.999887,0.999986,1.0];
    function ease(t){t=Math.max(0,Math.min(1,t));var i=t*100,lo=Math.floor(i),hi=Math.min(lo+1,100);return LT[lo]+(i-lo)*(LT[hi]-LT[lo]);}
    function spv(ms){if(!spOn)return 0;var t=(ms-spT0)*0.001;if(t>2){spOn=false;return 0;}return SA*Math.exp(-SZ*SW0*t)*Math.cos(SWD*t);}
    function idl(ms){var t=ms*0.001;return Math.sin(t*0.52)*THREE.MathUtils.degToRad(2)+Math.sin(t*0.81)*THREE.MathUtils.degToRad(0.9)+Math.sin(t*0.17)*THREE.MathUtils.degToRad(0.5);}
    function spin(){if(an)return;an=true;spOn=false;na0=na;nt0=performance.now();}

    var tx=0,ty=0,cx=0,cy=0,MT=THREE.MathUtils.degToRad(15);
    function ptr(ex,ey){var r=canvas.getBoundingClientRect();ty=((ex-r.left)/r.width*2-1)*MT;tx=-((ey-r.top)/r.height*2-1)*MT;}
    canvas.addEventListener('mouseenter',function(){spin();});
    canvas.addEventListener('mouseleave',function(){tx=0;ty=0;});
    canvas.addEventListener('mousemove', function(e){ptr(e.clientX,e.clientY);});
    canvas.addEventListener('touchstart',function(e){spin();if(e.touches[0])ptr(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
    canvas.addEventListener('touchmove', function(e){if(e.touches[0])ptr(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
    canvas.addEventListener('touchend',  function(){tx=0;ty=0;});

    window.addEventListener('resize', resize);

    function animate(time){
      requestAnimationFrame(animate);
      var now=performance.now();
      if(an){var t=Math.min((now-nt0)/NDUR,1);na=na0+ease(t)*NROT;if(t>=1){na=na0+NROT;an=false;spOn=true;spT0=now;}}
      var sp=spv(now),ib=spOn?0:Math.max(0,Math.min((now-spT0-600)/800,1));
      ng.rotation.z=na+sp+idl(time)*ib;
      cx+=(tx-cx)*0.08; cy+=(ty-cy)*0.08;
      mg.rotation.x=cx; mg.rotation.y=cy;
      mg.position.y=Math.sin(time*0.00025*Math.PI*2)*1.2;
      renderer.render(scene,camera);
    }
    renderer.render(scene,camera);
    animate(0);
  }

  init();
})();
</script>
</body>
</html>
